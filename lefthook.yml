pre-commit:
  parallel: true
  commands:
    rustfmt-check:
      run: cargo fmt --all -- --check
    cargo-clippy:
      run: cargo clippy
    biome-lint:
      run: pnpm lint
    ruff-check:
      run: proto run ruff -- check scripts
    shell-bash-n:
      run: bash -n install-web.sh make-web.sh scripts/debug-carcinisation.sh scripts/generate-docs.sh bin/pre-push.sh deploy/deploy.sh deploy/carcinisation-deploy-helper.sh
    shell-shellcheck:
      run: shellcheck install-web.sh make-web.sh scripts/debug-carcinisation.sh scripts/generate-docs.sh bin/pre-push.sh deploy/deploy.sh deploy/carcinisation-deploy-helper.sh
    shell-shfmt:
      run: shfmt -d install-web.sh make-web.sh scripts/debug-carcinisation.sh scripts/generate-docs.sh bin/pre-push.sh deploy/deploy.sh deploy/carcinisation-deploy-helper.sh

pre-push:
  commands:
    tests:
      run: ./bin/pre-push.sh
