pre-commit:
  parallel: true
  commands:
    rustfmt-check:
      run: cargo fmt --all -- --check
    cargo-clippy:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    taplo-check:
      run: taplo fmt --check
    biome-lint:
      run: pnpm lint
    ruff-check:
      run: proto run ruff -- check scripts
    check-shell:
      run: just check-shell

pre-push:
  commands:
    tests:
      run: ./bin/pre-push.sh
