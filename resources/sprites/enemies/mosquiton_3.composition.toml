[[parts]]
# Monolithic "wings" layer with visual-only render fragmentation. The exporter
# splits the layer into left/right halves for atlas dedup while preserving a
# single logical/gameplay part. Gameplay metadata is inherited from the "wing"
# definition — no duplication. Both halves break together as one unit.
id = "wings_visual"
definition_id = "wing"
name = "Wings Visual"
parent_id = "root"
source_layer = "wings"
split = "mirror_x"
draw_order = 10
pivot = { x = 0, y = 0 }
tags = ["wings"]

