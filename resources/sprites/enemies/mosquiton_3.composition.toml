[[animation_events]]
# Tag-local frame index inside `shoot_fly`. This is the first clear discharge
# pose, so projectile timing is authored by animation playback rather than tied
# to attack start.
tag = "shoot_fly"
frame = 5
kind = "projectile_spawn"
id = "blood_shot"
part_id = "head"
# Blood shots are center-anchored circles. This cue marks the center of the
# black mouth opening on the current `shoot_fly` head frame so the visible
# splat originates from the mouth itself.
local_offset = { x = 6, y = 9 }

