tags = ["leg", "limb", "targetable", "legs"]

## Wing overrides: flying attack animations use idle_fly wing cycle per direction.
[[animation_overrides]]
tags = ["front_shoot_fly", "front_melee_fly"]
source_tag = "front_idle_fly"
part_tags = ["wings"]

[[animation_overrides]]
tags = ["frontleft_shoot_fly", "frontleft_melee_fly"]
source_tag = "frontleft_idle_fly"
part_tags = ["wings"]

[[animation_overrides]]
tags = ["left_shoot_fly", "left_melee_fly"]
source_tag = "left_idle_fly"
part_tags = ["wings"]

[[animation_overrides]]
tags = ["backleft_shoot_fly", "backleft_melee_fly"]
source_tag = "backleft_idle_fly"
part_tags = ["wings"]

[[animation_overrides]]
tags = ["back_shoot_fly", "back_melee_fly"]
source_tag = "back_idle_fly"
part_tags = ["wings"]

## Projectile spawn event (front direction for ORS).
[[animation_events]]
tag = "front_shoot_fly"
frame = 5
kind = "projectile_spawn"
id = "blood_shot"
part_id = "head"
local_offset = { x = 6, y = 9 }

[directional]
authored_directions = ["front", "frontleft", "left", "backleft", "back"]
default_direction = "front"
# mirror_allowed: right-side directions derived from left-side via flip.
# Attack animations (shoot_fly, melee_fly) are close enough to symmetric
# that mirroring is acceptable — head/body offsets are near-centered.
# TODO: revisit if asymmetric weapon/arm poses are added.
mirror_policy = "mirror_allowed"

[directional.mirrors]
frontright = "frontleft"
right = "left"
backright = "backleft"

[gameplay]
entity_health_pool = "core"

[[gameplay.health_pools]]
id = "core"
max_health = 40
