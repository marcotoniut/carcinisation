# --- Directional config ---

[directional]
authored_directions = ["front", "frontleft", "left", "backleft", "back"]
default_direction = "front"
mirror_policy = "mirror_allowed"

[directional.mirrors]
frontright = "frontleft"
right = "left"
backright = "backleft"

# Back-facing: body on top of far-side parts, near arm stays visible.
[directional.layer_order.direction.back]
policy = "reverse"

# Backleft: arm_l (human arm) is near arm, stays in front.
# arm_r (crab arm) and weapon go behind body.
[directional.layer_order.direction.backleft.parts]
arm_r = 5
weapon = 5
