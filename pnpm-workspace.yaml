packages:
  - scripts
  - packages/*
onlyBuiltDependencies:
  - esbuild
# Security overrides for transitive dev-tooling deps (MCP SDK chain). Patches
# CVEs in hono (<4.12.21) and qs (<6.15.2). pnpm v11 reads overrides here, not
# from package.json's `pnpm.overrides`, in a workspace.
overrides:
  hono: '>=4.12.21'
  '@hono/node-server': '>=1.19.10'
  express-rate-limit: '>=8.5.0'
  qs: '>=6.15.2'
