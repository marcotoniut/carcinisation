name = "cargo-nextest"
type = "cli"
[resolve]
git-url = "https://github.com/nextest-rs/nextest"
[platform.linux]
download-file = "cargo-nextest-{version}-{arch}-unknown-linux-musl.tar.gz"
[platform.macos]
download-file = "cargo-nextest-{version}-universal-apple-darwin.tar.gz"
[platform.windows]
download-file = "cargo-nextest-{version}-{arch}-pc-windows-msvc.zip"
[install]
download-url = "https://github.com/nextest-rs/nextest/releases/download/cargo-nextest-{version}/{download_file}"
